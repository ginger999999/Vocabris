            { word: "CONVENIENCE", meaning: "方便/便利", options: ["麻煩", "困難", "阻礙"] },
            { word: "CONVERSATION", meaning: "對話/交談", options: ["演講", "獨白", "沈默"] },
            { word: "ENVIRONMENT", meaning: "環境", options: ["污染", "自然", "城市"] },
            { word: "INTELLIGENT", meaning: "聰明的", options: ["笨拙的", "懶惰的", "邪惡的"] },
            { word: "OPPORTUNITY", meaning: "機會", options: ["命運", "風險", "挑戰"] },
            { word: "PROFESSIONAL", meaning: "專業的", options: ["業餘的", "新手的", "隨便的"] },
            { word: "TECHNOLOGY", meaning: "科技", options: ["藝術", "歷史", "文學"] },
            { word: "TRADITIONAL", meaning: "傳統的", options: ["現代的", "創新的", "奇怪的"] },
            { word: "UNIVERSITY", meaning: "大學", options: ["高中", "國中", "小學"] },
            { word: "VOCABULARY", meaning: "字彙", options: ["文法", "發音", "聽力"] }
          ]
        };

        const GRID_ROWS = 18;
        const GRID_COLS = 12; // Width of the board in "blocks"
        const SPEED_SETTINGS = {
          slow: 1200,
          normal: 800,
          fast: 400
        };

        // Hook for custom intervals that can be paused
        function useInterval(callback, delay) {
          const savedCallback = useRef();

          useEffect(() => {
            savedCallback.current = callback;
          }, [callback]);

          useEffect(() => {
            if (delay !== null) {
              const id = setInterval(() => savedCallback.current(), delay);
              return () => clearInterval(id);
            }
          }, [delay]);
        }

        function VocabrisApp() {
          const UI_VERSION = 'UI 2026-03-06-2';

          // --- Game State ---
          const [currentUser, setCurrentUser] = useState(null); // 當前選擇的帳號
          const [gameState, setGameState] = useState('USER_SELECT'); // USER_SELECT, MENU, PLAYING, GAMEOVER, VOCAB_MANAGER
          const [level, setLevel] = useState('elementary');
          const [speedMode, setSpeedMode] = useState('normal');
          const [score, setScore] = useState(0);
          const [vocabularyLoaded, setVocabularyLoaded] = useState(false);
          
          // --- Vocabulary Manager State ---
          const [editingLevel, setEditingLevel] = useState('elementary');
          const [editingWord, setEditingWord] = useState(null); // null or word object for editing
          const [isAddingWord, setIsAddingWord] = useState(false);
          
          // --- Word Mastery Tracking ---
          // Format: { "WORD": correctCount } - 根據當前用戶從 vocabulary.json 載入
          const [wordMastery, setWordMastery] = useState({});
          
          // Mastered words (answered correctly 3 times)
          const [masteredWords, setMasteredWords] = useState([]);
          
          // Check URL parameters for view
          useEffect(() => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('view') === 'vocabulary') {
              setGameState('VOCAB_MANAGER');
              // Clear URL parameter
              window.history.replaceState({}, '', window.location.pathname);
            }
          }, []);
          
          // Board State
          // grid represents the "dead" blocks (stacked). 0 = empty, string = letter content
          const [grid, setGrid] = useState(Array(GRID_ROWS).fill().map(() => Array(GRID_COLS).fill(null)));
          
          // Active Falling Word State
          const [currentWord, setCurrentWord] = useState(null); 
          // currentWord structure: 
          // { 
          //   data: { word, meaning, options }, 
          //   x: number, 
          //   y: number, 
          //   letters: [{char: 'A', status: 'filled'|'missing', input: ''}],
          //   phase: 'A' | 'B',
          //   wrongTimer: 0 // for locking input
          // }

          const [nextWordData, setNextWordData] = useState(null);
          const [inputLocked, setInputLocked] = useState(false);

          // New State for Phase B Keyboard Navigation
          const [meaningCursorIndex, setMeaningCursorIndex] = useState(0);

          // Refs for audio and focus
          const gameContainerRef = useRef(null);
          const dropTouchLockRef = useRef(0);
          
          // --- Load Vocabulary from JSON file ---
          useEffect(() => {
            // Add timestamp to prevent caching
            const timestamp = new Date().getTime();
            fetch(`./vocabulary.json?v=${timestamp}`)
              .then(response => response.json())
              .then(data => {
                WORD_DATABASE = data;
                console.log('Loaded vocabulary:', {
                  elementary: data.elementary?.length || 0,
                  intermediate: data.intermediate?.length || 0,
                  advanced: data.advanced?.length || 0
                });
                setVocabularyLoaded(true);
              })
              .catch(error => {
                console.error('Error loading vocabulary:', error);
                // Keep the default vocabulary if loading fails
                setVocabularyLoaded(true);
              });
          }, []);
          
          // --- Load User Progress from vocabulary data when user is selected ---
          useEffect(() => {
            if (currentUser && vocabularyLoaded && WORD_DATABASE) {
              const mastery = {};
              const mastered = [];
              
              // 從 WORD_DATABASE 載入當前用戶的學習進度
              Object.keys(WORD_DATABASE).forEach(level => {
                WORD_DATABASE[level].forEach(wordData => {
                  const progress = parseInt(wordData[currentUser] || '0');
                  if (progress > 0 && progress < 3) {
                    mastery[wordData.word] = progress;
                  } else if (progress >= 3) {
                    mastered.push(wordData.word);
                  }
                });
              });
              
              setWordMastery(mastery);
              setMasteredWords(mastered);
            }
          }, [currentUser, vocabularyLoaded]);
          
          // --- Save Progress - Update vocabulary data and trigger backend save ---
          const saveProgress = useCallback(() => {
            if (!currentUser || !WORD_DATABASE) return;
            
            // 更新 WORD_DATABASE 中的用戶進度
            Object.keys(WORD_DATABASE).forEach(level => {
              WORD_DATABASE[level].forEach(wordData => {
                const word = wordData.word;
                if (masteredWords.includes(word)) {
                  wordData[currentUser] = '3';
                } else if (wordMastery[word]) {
                  wordData[currentUser] = String(wordMastery[word]);
                } else {
                  wordData[currentUser] = '0';
                }
              });
            });
            
            // 保存到 localStorage 作為備份
            localStorage.setItem(`vocabris_mastery_${currentUser}`, JSON.stringify(wordMastery));
            localStorage.setItem(`vocabris_mastered_${currentUser}`, JSON.stringify(masteredWords));
            
            // TODO: 可以在這裡添加 API 調用來保存回 CSV 檔案
          }, [currentUser, wordMastery, masteredWords]);
          
          // 當進度變化時自動保存
          useEffect(() => {
            if (currentUser) {
              saveProgress();
            }
          }, [wordMastery, masteredWords, currentUser, saveProgress]);
          
          // --- Focus Management (確保遊戲容器保持焦點) ---
          useEffect(() => {
            // 當遊戲開始或新單字生成後，確保遊戲容器獲得焦點，以便鍵盤輸入
            if (gameState === 'PLAYING' && gameContainerRef.current) {
                // 使用 setTimeout 確保在 React 渲染後執行，避免焦點被其他元素搶走
                const timeoutId = setTimeout(() => {
                    if (gameContainerRef.current) {
                        gameContainerRef.current.focus();
                    }
                }, 100); 
                return () => clearTimeout(timeoutId);
            }
          }, [gameState, currentWord?.phase, currentWord?.data.word]);

          // --- Helpers ---

          const speakWord = (text) => {
            if (!text || !('speechSynthesis' in window)) return;

            const synth = window.speechSynthesis;
            // Clear queued utterances so replay taps always pronounce the latest word.
            synth.cancel();
            if (synth.paused) {
              synth.resume();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            synth.speak(utterance);
          };

          const generateWordObj = (lvl) => {
            const list = WORD_DATABASE[lvl];
            
            // Filter out mastered words
            const availableWords = list.filter(item => !masteredWords.includes(item.word));
            
            // If all words are mastered, use all words again
            const wordPool = availableWords.length > 0 ? availableWords : list;
            
            const item = wordPool[Math.floor(Math.random() * wordPool.length)];
            
            // 50% of letters should be missing (空格)
            const wordLength = item.word.length;
            const missingCount = Math.max(1, Math.floor(wordLength * 0.5));

            const indices = new Set();
            while(indices.size < missingCount && indices.size < wordLength) {
              indices.add(Math.floor(Math.random() * wordLength));
            }

            const letters = item.word.split('').map((char, index) => ({
              char,
              status: indices.has(index) ? 'missing' : 'filled',
              input: indices.has(index) ? '' : char
            }));

            return {
              data: { ...item, 
                // Shuffle options for Phase B
                currentOptions: [...item.options, item.meaning].sort(() => Math.random() - 0.5) 
              },
              x: Math.floor((GRID_COLS - letters.length) / 2),
              y: 0,
              letters,
              phase: 'A',
              wrongTimer: 0
            };
          };

          // --- Game Loop Logic ---

          const startGame = () => {
            setGrid(Array(GRID_ROWS).fill().map(() => Array(GRID_COLS).fill(null)));
            setScore(0);
            setGameState('PLAYING');
            setMeaningCursorIndex(0); // Reset cursor on game start

            // Generate the first word's data immediately for the Next Word panel
            const firstWord = generateWordObj(level);
            setNextWordData(generateWordObj(level)); // Prepare the second word
            spawnNextWord(firstWord);
          };

          const spawnNextWord = (overrideNext = null) => {
            const next = overrideNext || nextWordData;
            
            // Check game over on spawn
            if (checkCollision(next.x, next.y, next.letters.length, grid)) {
              setGameState('GAMEOVER');
              return;
            }

            setCurrentWord(next);
            speakWord(next.data.word);
            setMeaningCursorIndex(0); // Reset cursor when a new word spawns/transitions to phase A
            
            // Prepare subsequent word
            setNextWordData(generateWordObj(level));
          };

          const checkCollision = (x, y, length, currentGrid) => {
            if (y >= GRID_ROWS) return true; // Floor
            
            // Check against stacked blocks
            for (let i = 0; i < length; i++) {
              const checkX = x + i;
              if (checkX < 0 || checkX >= GRID_COLS) continue; 
              
              if (currentGrid[y] && currentGrid[y][checkX] !== null) {
                return true;
              }
            }
            return false;
          };

          // New function to handle horizontal movement
          const moveBlock = (dir) => {
            if (!currentWord || currentWord.phase !== 'A' || inputLocked) return;

            const newX = currentWord.x + dir;
            const length = currentWord.letters.length;

            // 1. Boundary Check
            if (newX < 0 || newX + length > GRID_COLS) return;

            // 2. Collision Check
            if (!checkCollision(newX, currentWord.y, length, grid)) {
                setCurrentWord(prev => ({ ...prev, x: newX }));
            }
          };

          const solidifyWord = () => {
            // Lock word into grid
            const newGrid = [...grid];
            const { x, y, letters } = currentWord;
            
            // If y < 0, it's game over (stacked out of screen)
            if (y < 0) {
              setGameState('GAMEOVER');
              return;
            }

            let isGameOver = false;
            letters.forEach((l, idx) => {
              const gridY = y;
              const gridX = x + idx;
              if (gridY >= 0 && gridY < GRID_ROWS && gridX >= 0 && gridX < GRID_COLS) {
                // Solidified blocks use the actual character
                newGrid[gridY][gridX] = l.char; 
              } else {
                isGameOver = true;
              }
            });

            if (isGameOver) {
              setGameState('GAMEOVER');
            } else {
              setGrid(newGrid);
              spawnNextWord();
            }
          };

          const gameTick = useCallback(() => {
            if (gameState !== 'PLAYING' || !currentWord) return;
            
            // Phase B pauses gravity
            if (currentWord.phase === 'B') return;
            
            // Input Error Penalty Freeze
            if (inputLocked) return;

            const nextY = currentWord.y + 1;
            
            if (checkCollision(currentWord.x, nextY, currentWord.letters.length, grid)) {
              // Hit bottom or stack
              solidifyWord();
            } else {
              setCurrentWord(prev => ({ ...prev, y: nextY }));
            }
          }, [gameState, currentWord, grid, inputLocked, solidifyWord, checkCollision, spawnNextWord]);

          // Main Interval
          useInterval(gameTick, gameState === 'PLAYING' ? SPEED_SETTINGS[speedMode] : null);

          // Unlock input after penalty
          useEffect(() => {
            if (inputLocked) {
              const timer = setTimeout(() => setInputLocked(false), 1000);
              return () => clearTimeout(timer);
            }
          }, [inputLocked]);

          // --- Interactions ---

          const handleKeyDown = (e) => {
            if (gameState !== 'PLAYING' || !currentWord || inputLocked) return;

            // Keep legacy shortcut: press 0 to replay current word audio.
            if (e.key === '0' || e.code === 'Digit0' || e.code === 'Numpad0') {
              e.preventDefault();
              speakWord(currentWord?.data.word);
              return;
            }

            // 1. Movement Controls (Phase A only)
            if (currentWord.phase === 'A') {
              if (e.key === 'ArrowLeft') {
                e.preventDefault();
                moveBlock(-1);
                return;
              }
              if (e.key === 'ArrowRight') {
                e.preventDefault();
                moveBlock(1);
                return;
              }
              if (e.key === 'ArrowDown') {
                e.preventDefault();
                // Soft drop: move down one step immediately
                gameTick(); 
                return;
              }
              if (e.key === ' ' || e.code === 'Space' || e.key === 'Spacebar') {
                e.preventDefault();
                // Hard drop: send the current word to the bottom immediately.
                dropToBottom();
                return;
              }
            }

            // 2. Spelling Controls (Phase A only)
            if (currentWord.phase === 'A') {
              const charCode = e.key.toUpperCase();
              // Only process A-Z key presses
              if (!/^[A-Z]$/.test(charCode)) return; 
              
              e.preventDefault(); // Prevent default browser behavior (like scrolling with space/keys)

              // Find first missing letter
              const firstMissingIndex = currentWord.letters.findIndex(l => l.status === 'missing' && l.input === '');
              
              if (firstMissingIndex !== -1) {
                const targetChar = currentWord.letters[firstMissingIndex].char;
                
                // Case-insensitive check (charCode is already uppercase)
                if (charCode === targetChar) { 
                  const newLetters = [...currentWord.letters];
                  newLetters[firstMissingIndex].input = charCode;

                  // Check if Phase A Complete
                  const isComplete = newLetters.every(l => l.input !== '');
                  
                  setCurrentWord(prev => ({
                    ...prev,
                    letters: newLetters,
                    phase: isComplete ? 'B' : 'A'
                  }));

                  // If Phase A is complete, ensure the meaning cursor is set to the first option (0)
                  if (isComplete) {
                    setMeaningCursorIndex(0);
                  }

                } else {
                  // Wrong Input
                  setInputLocked(true); // Red flash / freeze
                  // Optional: Play error sound
                }
              }
            }

            // 3. Meaning Selection Controls (Phase B only)
            if (currentWord.phase === 'B' && currentWord.data.currentOptions) {
              const optionCount = currentWord.data.currentOptions.length;
              
              if (e.key === 'ArrowUp') {
                e.preventDefault();
                // Cycle up: (0 - 1 + 4) % 4 = 3 (moves from 0 to last)
                setMeaningCursorIndex(prev => (prev - 1 + optionCount) % optionCount);
                return;
              }
              if (e.key === 'ArrowDown') {
                e.preventDefault();
                // Cycle down: (0 + 1) % 4 = 1
                setMeaningCursorIndex(prev => (prev + 1) % optionCount);
                return;
              }
              if (e.key === 'Enter') {
                e.preventDefault();
                const selectedMeaning = currentWord.data.currentOptions[meaningCursorIndex];
                if (selectedMeaning) {
                  handlePhaseBAnswer(selectedMeaning);
                  // Reset cursor index after selection
                  setMeaningCursorIndex(0);
                }
                return;
              }
            }
          };

          const handlePhaseBAnswer = (selectedMeaning) => {
            if (selectedMeaning === currentWord.data.meaning) {
              // Success!
              setScore(prev => prev + (currentWord.letters.length * 100));
              
              // Update word mastery tracking
              const word = currentWord.data.word;
              const currentCount = wordMastery[word] || 0;
              const newCount = currentCount + 1;
              
              if (newCount >= 3) {
                // Mastered! Add to mastered list
                setMasteredWords(prev => {
                  if (!prev.includes(word)) {
                    return [...prev, word];
                  }
                  return prev;
                });
                // Remove from mastery tracking
                setWordMastery(prev => {
                  const updated = { ...prev };
                  delete updated[word];
                  return updated;
                });
              } else {
                // Update mastery count
                setWordMastery(prev => ({
                  ...prev,
                  [word]: newCount
                }));
              }
              
              // Word disappears (Cleared) instead of stacking
              spawnNextWord();
            } else {
              // Failed Phase B -> Reset mastery count for this word
              const word = currentWord.data.word;
              setWordMastery(prev => {
                const updated = { ...prev };
                delete updated[word];
                return updated;
              });
              
              // Drop to bottom immediately
              dropToBottom();
            }
            // Always reset cursor on answer
            setMeaningCursorIndex(0);
          };

          const dropToBottom = () => {
            // Find the lowest possible position for the word
            const { x, letters } = currentWord;
            let finalY = currentWord.y;
            
            // Keep moving down until collision
            while (finalY < GRID_ROWS && !checkCollision(x, finalY + 1, letters.length, grid)) {
              finalY++;
            }
            
            // Update position and solidify
            setCurrentWord(prev => ({ ...prev, y: finalY }));
            
            // Use setTimeout to ensure the visual update happens before solidifying
            setTimeout(() => {
              const newGrid = [...grid];
              const { x, letters } = currentWord;
              
              letters.forEach((l, idx) => {
                const gridY = finalY;
                const gridX = x + idx;
                if (gridY >= 0 && gridY < GRID_ROWS && gridX >= 0 && gridX < GRID_COLS) {
                  newGrid[gridY][gridX] = l.char;
                }
              });
              
              setGrid(newGrid);
              spawnNextWord();
            }, 100);
          };

          const handleDropButtonTouchStart = (e) => {
            e.preventDefault();
            dropTouchLockRef.current = Date.now();
            dropToBottom();
          };

          const handleDropButtonClick = () => {
            // Ignore synthetic click right after touchstart on mobile/tablet.
            if (Date.now() - dropTouchLockRef.current < 500) return;
            dropToBottom();
          };

          // --- Rendering Helpers ---

          const renderGrid = () => {
            const displayGrid = grid.map(row => [...row]);

            // Overlay active word
            if (currentWord && gameState === 'PLAYING') {
              const { x, y, letters, phase } = currentWord;
              
              // (計算遊標位置的索引)
              const currentInputIndex = phase === 'A' 
                  ? letters.findIndex(l => l.status === 'missing' && l.input === '') 
                  : -1;

              // Render the word block even if y is negative (above the grid)
              letters.forEach((l, idx) => {
                const gridY = y;
                const gridX = x + idx;

                if (gridY >= 0 && gridY < GRID_ROWS && gridX >= 0 && gridX < GRID_COLS) {
                  
                  // (判斷是否為遊標位置)
                  const isCursorPosition = (phase === 'A' && idx === currentInputIndex);

                  displayGrid[gridY][gridX] = { 
                    type: 'active', 
                    char: l.status === 'filled' ? l.char : (l.input || '_'),
                    isError: inputLocked && l.status === 'missing' && !l.input, // Visualize error on current hole
                    isMissing: l.status === 'missing',
                    isFilled: l.input !== '',
                    isCursor: isCursorPosition // <-- 傳遞遊標狀態
                  };
                }
              });
            }

            return (
              <div className="bg-gray-900 border-4 border-gray-700 p-1 relative"
                   style={{ 
                     display: 'grid', 
                     gridTemplateColumns: `repeat(${GRID_COLS}, 1fr)`,
                     gridTemplateRows: `repeat(${GRID_ROWS}, 1fr)`,
                     aspectRatio: `${GRID_COLS}/${GRID_ROWS}`,
                     width: '100%',
                     maxWidth: '500px',
                     maxHeight: '70vh'
                   }}>
                {displayGrid.map((row, rIdx) => (
                  row.map((cell, cIdx) => {
                    let cellClass = "border border-gray-800 flex items-center justify-center text-sm md:text-lg font-bold ";
                    
                    if (cell === null) {
                      cellClass += "bg-gray-950";
                    } else if (typeof cell === 'string') {
                      // Solidified Block (Garbage)
                      cellClass += "bg-gray-600 text-gray-300 shadow-inner";
                    } else if (cell.type === 'active') {
                      // Active Falling Block
                      if (cell.isError) {
                         cellClass += "bg-red-500 text-white animate-pulse";
                      } else if (cell.isCursor) { // <-- 應用遊標樣式
                         cellClass += "bg-yellow-500 text-black ring-2 ring-offset-1 ring-offset-gray-950 ring-yellow-300 transition-all duration-150"; 
                      } else if (cell.isMissing && !cell.isFilled) {
                         cellClass += "bg-yellow-900 text-yellow-300 border-yellow-500";
                      } else if (cell.isFilled && cell.isMissing) {
                         cellClass += "bg-green-600 text-white"; // Just filled
                      } else {
                         cellClass += "bg-blue-600 text-white"; // Default filled
                      }
                    }

                    return (
                      <div key={`${rIdx}-${cIdx}`} className={cellClass}>
                        {cell && typeof cell !== 'string' ? cell.char : cell}
                      </div>
                    );
                  })
                ))}
              </div>
            );
          };

          // --- UI Components ---

          // 帳號選擇畫面
          const UserSelectScreen = () => {
            const users = [
              { name: 'Ginger', color: 'from-pink-500 to-rose-600', icon: '🌸' },
              { name: 'River', color: 'from-blue-500 to-cyan-600', icon: '🌊' },
              { name: 'Sigma', color: 'from-purple-500 to-violet-600', icon: '⚡' }
            ];

            return (
              <div className="absolute inset-0 z-50 bg-gray-900 text-white flex flex-col items-center justify-center space-y-8 p-6">
                <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600 tracking-tighter mb-4">
                  VOCABRIS
                </h1>
                
                <p className="text-xl text-gray-400 mb-8">選擇你的帳號 | Choose Your Account</p>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
                  {users.map(user => (
                    <button
                      key={user.name}
                      onClick={() => {
                        setCurrentUser(user.name);
                        setGameState('MENU');
                      }}
                      className={`bg-gradient-to-br ${user.color} p-8 rounded-2xl shadow-2xl hover:scale-105 transition-all duration-300 flex flex-col items-center gap-4 border-2 border-white/20`}
                    >
                      <div className="text-6xl">{user.icon}</div>
                      <div className="text-3xl font-bold">{user.name}</div>
                      <div className="text-sm text-white/80">點擊開始 | Click to Start</div>
                    </button>
                  ))}
                </div>
                
                {!vocabularyLoaded && (
                  <div className="text-yellow-400 text-sm mt-8">Loading vocabulary... (載入單字中...)</div>
                )}
              </div>
            );
          };

          const MenuScreen = () => (
            <div className="absolute inset-0 z-50 bg-gray-900 text-white flex flex-col items-center justify-center space-y-8 p-6">
              <div className="absolute top-4 left-4">
                <button 
                  onClick={() => setGameState('USER_SELECT')}
                  className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm flex items-center gap-2 border border-gray-700"
                >
                  ← 切換帳號
                </button>
              </div>
              
              <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600 tracking-tighter mb-4">
                VOCABRIS
              </h1>
              
              {currentUser && (
                <div className="text-2xl text-gray-300 mb-2">
                  歡迎回來，<span className="font-bold text-blue-400">{currentUser}</span>！
                </div>
              )}
              
              {!vocabularyLoaded && (
                <div className="text-yellow-400 text-sm">Loading vocabulary... (載入單字中...)</div>
              )}
              
              <div className="w-full max-w-md space-y-6 bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
                {/* Level Selection */}
                <div>
                  <label className="flex items-center gap-2 text-blue-400 font-bold mb-3 uppercase text-sm tracking-wider">
                    {BookOpen && <BookOpen size={16} />} Select Difficulty (選擇難度)
                  </label>
                  <div className="grid grid-cols-3 gap-2">
                    {['elementary', 'intermediate', 'advanced'].map((lvl) => (
                      <button
                        key={lvl}
                        onClick={() => setLevel(lvl)}
                        className={`p-2 text-sm rounded-lg border-2 transition-all ${
                          level === lvl 
                          ? 'border-blue-500 bg-blue-500/20 text-white' 
                          : 'border-gray-600 text-gray-400 hover:border-gray-500'
                        }`}
                      >
                        {lvl.charAt(0).toUpperCase() + lvl.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Speed Selection */}
                <div>
                  <label className="flex items-center gap-2 text-purple-400 font-bold mb-3 uppercase text-sm tracking-wider">
                    {Settings && <Settings size={16} />} Game Speed (遊戲速度)
                  </label>
                  <div className="grid grid-cols-3 gap-2">
                    {['slow', 'normal', 'fast'].map((s) => (
                      <button
                        key={s}
                        onClick={() => setSpeedMode(s)}
                        className={`p-2 text-sm rounded-lg border-2 transition-all ${
                          speedMode === s 
                          ? 'border-purple-500 bg-purple-500/20 text-white' 
                          : 'border-gray-600 text-gray-400 hover:border-gray-500'
                        }`}
                      >
                        {s.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>

                <button 
                  onClick={startGame}
                  disabled={!vocabularyLoaded}
                  className={`w-full py-4 mt-4 rounded-xl font-black text-xl transition-transform flex items-center justify-center gap-2 shadow-lg ${
                    vocabularyLoaded 
                      ? 'bg-gradient-to-r from-blue-600 to-purple-600 hover:scale-[1.02] shadow-purple-900/50' 
                      : 'bg-gray-600 cursor-not-allowed'
                  }`}
                >
                  {Play && <Play fill="currentColor" />} START GAME
                </button>
                
                {/* Vocabulary Manager Button */}
                <button 
                  onClick={() => {
                    setEditingLevel(level);
                    setGameState('VOCAB_MANAGER');
                  }}
                  disabled={!vocabularyLoaded}
                  className={`w-full py-3 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-2 shadow-lg ${
                    vocabularyLoaded 
                      ? 'bg-gradient-to-r from-green-600 to-teal-600 hover:scale-[1.02] shadow-teal-900/50' 
                      : 'bg-gray-600 cursor-not-allowed'
                  }`}
                >
                  {Settings && <Settings size={20} />} 修改單字 | Edit Vocabulary
                </button>
                
                {/* Mastery Stats */}
                <div className="mt-4 pt-4 border-t border-gray-700">
                  <p className="text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Progress (進度)</p>
                  <div className="grid grid-cols-2 gap-2 text-sm">
                    <div className="bg-gray-700 p-2 rounded">
                      <span className="text-gray-400">Learning:</span>
                      <span className="ml-2 text-yellow-400 font-bold">{Object.keys(wordMastery).length}</span>
                    </div>
                    <div className="bg-gray-700 p-2 rounded">
                      <span className="text-gray-400">Mastered:</span>
                      <span className="ml-2 text-green-400 font-bold">{masteredWords.length}</span>
                    </div>
                  </div>
                  {Object.keys(wordMastery).length > 0 && (
                    <button 
                      onClick={() => {
                        if (window.confirm('Clear all progress? (清除所有進度?)')) {
                          setWordMastery({});
                          setMasteredWords([]);
                        }
                      }}
                      className="w-full mt-2 py-2 text-xs bg-red-900/30 hover:bg-red-900/50 rounded border border-red-700 text-red-300"
                    >
                      Reset Progress (重置進度)
                    </button>
                  )}
                </div>
              </div>
            </div>
          );

          const VocabularyManagerScreen = () => {
            const currentLevelWords = WORD_DATABASE[editingLevel] || [];
            const [searchTerm, setSearchTerm] = useState('');
            const [formData, setFormData] = useState({ word: '', meaning: '', options: ['', '', ''] });
            const [availableCsvFiles, setAvailableCsvFiles] = useState([]);
            const [selectedCsvFile, setSelectedCsvFile] = useState(`${editingLevel}_words.csv`);
            const [currentCsvConfig, setCurrentCsvConfig] = useState({});
            const [isSwitching, setIsSwitching] = useState(false);
            const [editingWordName, setEditingWordName] = useState(null); // Track by word name instead of object
            const [isServerMode, setIsServerMode] = useState(false); // Check if server APIs are available
            
            // Function to reload CSV list
            const reloadCsvList = async () => {
              try {
                const response = await fetch('/api/list-csv');
                if (response.ok) {
                  const data = await response.json();
                  setAvailableCsvFiles(data.files || []);
                  setIsServerMode(true);
                } else {
                  throw new Error('API not available');
                }
              } catch (err) {
                console.log('Server API not available, using static mode');
                // Fallback: use static list of CSV files
                setAvailableCsvFiles([
                  'elementary_words.csv',
                  'intermediate_words.csv', 
                  'advanced_words.csv',
                  'v1200.csv'
                ]);
                setIsServerMode(false);
              }
            };
            
            // Load available CSV files and current config
            useEffect(() => {
              reloadCsvList();
              
              // Try to load config from API first, fallback to static file
              fetch('/api/get-csv-config')
                .then(res => {
                  if (res.ok) {
                    setIsServerMode(true);
                    return res.json();
                  } else {
                    throw new Error('API not available');
                  }
                })
                .then(data => {
                  setCurrentCsvConfig(data);
                })
                .catch(err => {
                  console.log('Server API not available, loading static config');
                  // Fallback: load csv_config.json as static file
                  fetch('/csv_config.json')
                    .then(res => res.json())
                    .then(data => setCurrentCsvConfig(data))
                    .catch(err2 => {
                      console.error('Failed to load config:', err2);
                      // Use default config
                      setCurrentCsvConfig({
                        'elementary': 'elementary_words.csv',
                        'intermediate': 'intermediate_words.csv',
                        'advanced': 'advanced_words.csv'
                      });
                    });
                  setIsServerMode(false);
                });
            }, []);
            
            // Listen for messages from import.html
            useEffect(() => {
              const handleMessage = (event) => {
                if (event.data && event.data.type === 'CSV_CREATED') {
                  console.log('New CSV created:', event.data.filename);
                  // Reload CSV list
                  reloadCsvList();
                  // Show notification
                  alert(`新檔案已建立：${event.data.filename}\n請在下拉選單中選擇並點擊"應用"`);
                }
              };
              
              window.addEventListener('message', handleMessage);
              return () => window.removeEventListener('message', handleMessage);
            }, []);
            
            // Update selected CSV when level changes
            useEffect(() => {
              if (currentCsvConfig[editingLevel]) {
                setSelectedCsvFile(currentCsvConfig[editingLevel]);
              }
              // Clear editing state when level changes
              setEditingWordName(null);
              setIsAddingWord(false);
              setSearchTerm('');
            }, [editingLevel, currentCsvConfig]);
            
            const handleSwitchCsv = async () => {
              if (selectedCsvFile === currentCsvConfig[editingLevel]) {
                alert('已經是當前檔案 | Already using this file');
                return;
              }
              
              if (!confirm(`確定要將 ${editingLevel} 級別切換到 ${selectedCsvFile} 嗎？\n\n所有檔案都會保留，只是切換資料來源。\n\nSwitch ${editingLevel} level to ${selectedCsvFile}?\n\nAll files will be preserved, just switching the data source.`)) {
                return;
              }
              
              setIsSwitching(true);
              try {
                const response = await fetch('/api/switch-csv', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    source: selectedCsvFile,
                    level: editingLevel
                  })
                });
                
                const result = await response.json();
                if (response.ok) {
                  alert('切換成功！請重新載入頁面查看新資料。\nSwitched successfully! Please reload the page.');
                  window.location.reload();
                } else {
                  alert('切換失敗: ' + (result.error || 'Unknown error'));
                }
              } catch (error) {
                alert('切換失敗: ' + error.message);
              } finally {
                setIsSwitching(false);
              }
            };
            
            const filteredWords = currentLevelWords.filter(w => 
              w.word.toLowerCase().includes(searchTerm.toLowerCase()) ||
              w.meaning.includes(searchTerm)
            );
            
            const handleEdit = (wordObj) => {
              console.log('Editing word:', wordObj);
              setEditingWordName(wordObj.word);
              setFormData({
                word: wordObj.word,
                meaning: wordObj.meaning,
                options: [...wordObj.options]
              });
              setIsAddingWord(false);
              console.log('Form data set:', {
                word: wordObj.word,
                meaning: wordObj.meaning,
                options: wordObj.options
              });
            };
            
            const handleAdd = () => {
              setEditingWordName(null);
              setFormData({ word: '', meaning: '', options: ['', '', ''] });
              setIsAddingWord(true);
            };
            
            const handleSave = async () => {
              if (!formData.word || !formData.meaning || formData.options.some(opt => !opt)) {
                alert('請填寫完整資訊 | Please fill in all fields');
                return;
              }
              
              if (editingWordName) {
                // Update existing word
                const wordToEdit = WORD_DATABASE[editingLevel].find(w => w.word === editingWordName);
                if (wordToEdit) {
                  wordToEdit.word = formData.word.toUpperCase();
                  wordToEdit.meaning = formData.meaning;
                  wordToEdit.options = formData.options;
                }
              } else {
                // Add new word
                WORD_DATABASE[editingLevel].push({
                  word: formData.word.toUpperCase(),
                  meaning: formData.meaning,
                  options: formData.options
                });
              }
              
              // 儲存到 CSV 檔案
              if (isServerMode) {
                try {
                  const response = await fetch('/api/update-words', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      level: editingLevel,
                      words: WORD_DATABASE[editingLevel]
                    })
                  });
                  
                  const result = await response.json();
                  if (result.success) {
                    setEditingWordName(null);
                    setIsAddingWord(false);
                    alert('儲存成功！CSV 檔案已更新 | Saved successfully! CSV file updated');
                  } else {
                    alert('儲存失敗: ' + result.error);
                  }
                } catch (error) {
                  console.error('Error saving to CSV:', error);
                  alert('儲存到 CSV 失敗 | Failed to save to CSV: ' + error.message);
                }
              } else {
                // Static mode - only update in memory
                setEditingWordName(null);
                setIsAddingWord(false);
                alert('⚠️ 靜態部署模式\n修改已套用到當前頁面，但無法儲存到 CSV 檔案\n重新整理後將恢復原始資料\n\n如需永久修改，請在本地環境執行 server.py\n\nStatic deployment mode\nChanges applied to current page only\nWill be reset on refresh');
              }
            };
            
            const handleDelete = async (wordName) => {
              if (window.confirm(`確定要刪除「${wordName}」嗎？ | Delete "${wordName}"?`)) {
                const index = WORD_DATABASE[editingLevel].findIndex(w => w.word === wordName);
                if (index > -1) {
                  WORD_DATABASE[editingLevel].splice(index, 1);
                  setEditingWordName(null);
                  
                  // 儲存到 CSV 檔案
                  try {
                    const response = await fetch('/api/update-words', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({
                        level: editingLevel,
                        words: WORD_DATABASE[editingLevel]
                      })
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                      alert('刪除成功！CSV 檔案已更新 | Deleted successfully! CSV file updated');
                    } else {
                      alert('刪除失敗: ' + result.error);
                    }
                  } catch (error) {
                    console.error('Error saving to CSV:', error);
                    alert('儲存到 CSV 失敗 | Failed to save to CSV: ' + error.message);
                  }
                }
              }
            };
            
            return (
              <div className="absolute inset-0 z-50 bg-gray-900 text-white flex flex-col p-6 overflow-hidden">
                {/* Header */}
                <div className="flex items-center justify-between mb-6">
                  <button 
                    onClick={() => {
                      setGameState('MENU');
                      setEditingWord(null);
                      setIsAddingWord(false);
                    }}
                    className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm flex items-center gap-2 border border-gray-700"
                  >
                    ← 返回主選單 | Back to Menu
                  </button>
                  <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-teal-600">
                    單字管理 | Vocabulary Manager
                  </h1>
                  <div className="w-32"></div>
                </div>
                
                <div className="flex-1 flex gap-4 overflow-hidden">
                  {/* Left Panel - Word List */}
                  <div className="w-1/2 flex flex-col bg-gray-800 rounded-xl border border-gray-700 p-4">
                    {/* Level Selector */}
                    <div className="mb-4">
                      <label className="text-sm text-gray-400 mb-2 block">難度 | Level:</label>
                      <div className="grid grid-cols-3 gap-2">
                        {['elementary', 'intermediate', 'advanced'].map((lvl) => (
                          <button
                            key={lvl}
                            onClick={() => {
                              setEditingLevel(lvl);
                              setEditingWord(null);
                              setIsAddingWord(false);
                            }}
                            className={`p-2 text-sm rounded-lg border-2 transition-all ${
                              editingLevel === lvl 
                              ? 'border-green-500 bg-green-500/20 text-white' 
                              : 'border-gray-600 text-gray-400 hover:border-gray-500'
                            }`}
                          >
                            {lvl.charAt(0).toUpperCase() + lvl.slice(1)}
                          </button>
                        ))}
                      </div>
                    </div>
                    
                    {/* CSV File Selector */}
                    <div className="mb-4">
                      <label className="text-sm text-gray-400 mb-2 block">資料來源檔案 | Source CSV File:</label>
                      <div className="flex gap-2">
                        <select
                          value={selectedCsvFile}
                          onChange={(e) => setSelectedCsvFile(e.target.value)}
                          className="flex-1 px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:border-green-500"
                        >
                          {availableCsvFiles.map((file) => (
                            <option key={file} value={file}>
                              {file}
                            </option>
                          ))}
                        </select>
                        <button
                          onClick={handleSwitchCsv}
                          disabled={isSwitching || selectedCsvFile === currentCsvConfig[editingLevel]}
                          className="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed rounded-lg text-sm font-bold transition-all"
                        >
                          {isSwitching ? '處理中...' : '應用'}
                        </button>
                        <button
                          onClick={() => window.open('/import.html', '_blank')}
                          className="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-sm font-bold transition-all whitespace-nowrap"
                          title="開啟匯入工具建立新的單字資料檔案"
                        >
                          📁 自建資料
                        </button>
                      </div>
                      <p className="text-xs text-gray-500 mt-1">
                        💡 目前使用: <span className="text-green-400 font-bold">{currentCsvConfig[editingLevel] || 'loading...'}</span>
                        <br />
                        選擇其他 CSV 檔案並點擊"應用"來切換資料來源（所有檔案都會保留）
                      </p>
                    </div>
                    
                    {/* Search Bar */}
                    <input
                      type="text"
                      placeholder="搜尋單字... | Search word..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white mb-4 focus:outline-none focus:border-green-500"
                    />
                    
                    {/* Add Button */}
                    <button
                      onClick={handleAdd}
                      className="w-full py-2 mb-4 bg-green-600 hover:bg-green-700 rounded-lg font-bold flex items-center justify-center gap-2"
                    >
                      + 新增單字 | Add Word
                    </button>
                    
                    {/* Word List */}
                    <div className="flex-1 overflow-y-auto space-y-2">
                      <div className="text-sm text-gray-400 mb-2">
                        共 {filteredWords.length} 個單字 | {filteredWords.length} words
                      </div>
                      {filteredWords.map((wordObj) => (
                        <div
                          key={wordObj.word}
                          className={`p-3 rounded-lg border-2 cursor-pointer transition-all ${
                            editingWordName === wordObj.word
                            ? 'border-green-500 bg-green-500/10'
                            : 'border-gray-700 bg-gray-900 hover:border-gray-600'
                          }`}
                          onClick={() => handleEdit(wordObj)}
                        >
                          <div className="font-bold text-lg">{wordObj.word}</div>
                          <div className="text-sm text-gray-400">{wordObj.meaning}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  
                  {/* Right Panel - Edit Form */}
                  <div className="w-1/2 flex flex-col bg-gray-800 rounded-xl border border-gray-700 p-6">
                    {(editingWordName || isAddingWord) ? (
                      <div className="space-y-4">
                        <h2 className="text-2xl font-bold mb-4">
                          {editingWordName ? '編輯單字 | Edit Word' : '新增單字 | Add Word'}
                        </h2>
                        
                        {/* Word Input */}
                        <div>
                          <label className="text-sm text-gray-400 mb-1 block">單字 | Word:</label>
                          <input
                            type="text"
                            value={formData.word}
                            onChange={(e) => setFormData({ ...formData, word: e.target.value.toUpperCase() })}
                            className="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-xl font-bold focus:outline-none focus:border-green-500"
                            placeholder="例如: APPLE"
                          />
                        </div>
                        
                        {/* Meaning Input */}
                        <div>
                          <label className="text-sm text-gray-400 mb-1 block">中文釋義 | Meaning:</label>
                          <input
                            type="text"
                            value={formData.meaning}
                            onChange={(e) => setFormData({ ...formData, meaning: e.target.value })}
                            className="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-green-500"
                            placeholder="例如: 蘋果"
                          />
                        </div>
                        
                        {/* Options Inputs */}
                        <div>
                          <label className="text-sm text-gray-400 mb-1 block">錯誤選項 | Wrong Options (3個):</label>
                          {formData.options.map((opt, idx) => (
                            <input
                              key={idx}
                              type="text"
                              value={opt}
                              onChange={(e) => {
                                const newOptions = [...formData.options];
                                newOptions[idx] = e.target.value;
                                setFormData({ ...formData, options: newOptions });
                              }}
                              className="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white mb-2 focus:outline-none focus:border-green-500"
                              placeholder={`錯誤選項 ${idx + 1}`}
                            />
                          ))}
                        </div>
                        
                        {/* Action Buttons */}
                        <div className="flex gap-2 pt-4">
                          <button
                            onClick={handleSave}
                            className="flex-1 py-3 bg-green-600 hover:bg-green-700 rounded-lg font-bold"
                          >
                            💾 儲存 | Save
                          </button>
                          <button
                            onClick={() => {
                              setEditingWordName(null);
                              setIsAddingWord(false);
                            }}
                            className="flex-1 py-3 bg-gray-600 hover:bg-gray-700 rounded-lg font-bold"
                          >
                            ✕ 取消 | Cancel
                          </button>
                          {editingWordName && (
                            <button
                              onClick={() => handleDelete(editingWordName)}
                              className="px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg font-bold"
                            >
                              🗑️ 刪除 | Delete
                            </button>
                          )}
                        </div>
                      </div>
                    ) : (
                      <div className="flex-1 flex items-center justify-center text-gray-500">
                        <div className="text-center">
                          <div className="text-6xl mb-4">📚</div>
                          <p>選擇一個單字進行編輯</p>
                          <p className="text-sm">或點擊「新增單字」按鈕</p>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          const GameOverScreen = () => (
            <div className="absolute inset-0 z-50 bg-black/90 text-white flex flex-col items-center justify-center p-6 text-center animate-in fade-in duration-500">
              {Skull && <Skull size={64} className="text-red-500 mb-4" />}
              <h2 className="text-4xl font-bold mb-2">GAME OVER (遊戲結束)</h2>
              <p className="text-gray-400 mb-8">The stack reached the top! (方塊堆到頂了!)</p>
              
              <div className="bg-gray-800 rounded-xl p-6 mb-8 w-64 border border-gray-700">
                <p className="text-sm text-gray-500 uppercase tracking-wider mb-1">Final Score (最終分數)</p>
                <p className="text-5xl font-mono text-yellow-400">{score}</p>
              </div>

              <button 
                onClick={() => setGameState('MENU')}
                className="px-8 py-3 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition-colors flex items-center gap-2"
              >
                {RefreshCw && <RefreshCw size={20} />} Play Again (再玩一次)
              </button>
            </div>
          );

          const VirtualKeyboard = () => (
            <div className="lg:hidden w-full max-w-lg mx-auto mt-2 relative pt-12">
              <button
                className="absolute top-0 right-2 bg-orange-700 px-4 py-2 rounded-full active:bg-orange-500 active:scale-95 transition-all shadow-lg border border-orange-500"
                onTouchStart={handleDropButtonTouchStart}
                onClick={handleDropButtonClick}
                aria-label="Hard drop"
              >
                <span className="text-white text-xs md:text-lg font-bold tracking-wide">DROP</span>
              </button>

               {/* Mobile Movement Controls */}
               <div className="flex justify-center gap-6 mb-3">
                  <button 
                     className="bg-gray-700 p-4 rounded-full active:bg-blue-600 active:scale-95 transition-all shadow-lg border border-gray-600"
                     onTouchStart={(e) => { e.preventDefault(); moveBlock(-1); }}
                     onClick={() => moveBlock(-1)}
                  >
                     {ArrowLeft && <ArrowLeft size={24} className="text-white"/>}
                  </button>
                  
                  <button 
                     className="bg-gray-700 p-4 rounded-full active:bg-blue-600 active:scale-95 transition-all shadow-lg border border-gray-600"
                     onTouchStart={(e) => { e.preventDefault(); gameTick(); }}
                     onClick={() => gameTick()}
                  >
                     {ArrowDown && <ArrowDown size={24} className="text-white"/>}
                  </button>

                  <button 
                     className="bg-gray-700 p-4 rounded-full active:bg-blue-600 active:scale-95 transition-all shadow-lg border border-gray-600"
                     onTouchStart={(e) => { e.preventDefault(); moveBlock(1); }}
                     onClick={() => moveBlock(1)}
                  >
                     {ArrowRight && <ArrowRight size={24} className="text-white"/>}
                  </button>

               </div>

               {/* Letter Keys */}
               <div className="grid grid-cols-10 gap-1 md:gap-2">
                  {"QWERTYUIOPASDFGHJKLZXCVBNM".split("").map((char) => (
                    <button
                      key={char}
                      onClick={() => handleKeyDown({ key: char, preventDefault: () => {} })} // Mimic event object
                      className="bg-gray-700 text-white p-2 md:p-4 rounded text-xs md:text-xl font-bold active:bg-blue-500 shadow border border-gray-600"
                    >
                      {char}
                    </button>
                  ))}
               </div>
            </div>
          );

          // --- Main Render ---

          return (
            <div 
              className="game-container min-h-screen bg-gray-950 text-gray-100 font-sans overflow-hidden select-none flex flex-col items-center justify-center"
              tabIndex={0}
              onKeyDown={handleKeyDown}
              ref={gameContainerRef}
            >
              <div className="fixed top-2 right-2 z-[100] px-2 py-1 text-[10px] font-mono text-cyan-300 bg-black/70 border border-cyan-700 rounded">
                {UI_VERSION}
              </div>

              {gameState === 'USER_SELECT' && <UserSelectScreen />}
              {gameState === 'MENU' && <MenuScreen />}
              {gameState === 'GAMEOVER' && <GameOverScreen />}
              {gameState === 'VOCAB_MANAGER' && <VocabularyManagerScreen />}

              {/* Main Game Layout - Single Column */}
              <div className="w-full max-w-4xl min-h-screen flex flex-col gap-4 p-4">

                {/* Mobile Top Progress */}
                {currentWord && (
                  <div className="lg:hidden bg-gray-900 p-3 md:p-5 rounded-xl border border-gray-800 shadow-xl flex-shrink-0">
                    <p className="text-xs md:text-xl text-gray-500 uppercase font-bold tracking-wider mb-2 text-center">Progress (進度)</p>
                    <div className="flex gap-2 justify-center">
                      {[1, 2, 3].map(i => (
                        <div key={i} className={`w-3 h-3 rounded-full ${i <= (wordMastery[currentWord.data.word] || 0) ? 'bg-yellow-400' : 'bg-gray-700'}`}></div>
                      ))}
                    </div>
                  </div>
                )}
                
                {/* Top Stats Bar */}
                <div className="bg-gray-900 p-4 md:p-6 rounded-xl border border-gray-800 shadow-xl flex-shrink-0">
                  <div className="flex justify-between items-center gap-6">
                    <div className="flex-1 text-center">
                      <p className="text-xs md:text-xl text-gray-500 uppercase font-bold tracking-wider mb-1">Score (分數)</p>
                      <div className="text-3xl md:text-7xl font-mono text-blue-400">{score}</div>
                    </div>
                    <div className="flex-1 text-center">
                      <p className="text-xs md:text-xl text-gray-500 uppercase font-bold tracking-wider mb-1">Level (難度)</p>
                      <div className="text-lg md:text-4xl font-semibold text-gray-300 capitalize">{level}</div>
                    </div>
                    <div className="flex-1 text-center">
                      <p className="text-xs md:text-xl text-gray-500 uppercase font-bold tracking-wider mb-1">Speed (速度)</p>
                      <div className="text-lg md:text-4xl font-semibold text-gray-300 capitalize">{speedMode}</div>
                    </div>
                    {currentWord && (
                      <div className="hidden lg:block flex-1 text-center">
                        <p className="text-xs md:text-xl text-gray-500 uppercase font-bold tracking-wider mb-1">Progress (進度)</p>
                        <div className="flex gap-1 justify-center mt-2">
                          {[1, 2, 3].map(i => (
                            <div key={i} className={`w-3 h-3 rounded-full ${i <= (wordMastery[currentWord.data.word] || 0) ? 'bg-yellow-400' : 'bg-gray-700'}`}></div>
                          ))}
                        </div>
                      </div>
                    )}
                    {gameState === 'PLAYING' && (
                      <button onClick={() => setGameState('MENU')} className="text-xs md:text-lg border border-gray-600 px-3 py-2 md:px-6 md:py-4 rounded hover:bg-gray-800 ml-4">EXIT</button>
                    )}
                  </div>
                </div>

                {/* Game Board */}
                <div className="flex-1 relative flex flex-col items-center justify-center bg-gray-900 rounded-xl border border-gray-800 shadow-2xl overflow-visible min-h-[600px]">
                  {/* Status indicator */}
                  <div className="absolute top-2 left-2 flex items-center gap-2 z-10">
                    <span className={`w-3 h-3 rounded-full ${inputLocked ? 'bg-red-500' : 'bg-green-500'}`}></span>
                    <span className="text-xs md:text-lg font-mono text-gray-400">STATUS: {gameState}</span>
                  </div>

                  {/* Phase A Helper Text */}
                  {currentWord?.phase === 'A' && (
                    <div className="absolute top-2 right-2 z-10 flex items-center gap-2">
                      <button
                        type="button"
                        onClick={() => speakWord(currentWord?.data.word)}
                        className="p-2 md:px-6 md:py-4 bg-blue-900/80 border border-blue-500/30 rounded-lg backdrop-blur-sm text-blue-300 text-xs md:text-lg hover:bg-blue-800/80 active:scale-95 transition"
                        aria-label="Replay pronunciation"
                      >
                        Type missing letters! (輸入缺字母!)
                      </button>
                      <button
                        type="button"
                        onClick={() => speakWord(currentWord?.data.word)}
                        className="w-9 h-9 md:w-14 md:h-14 flex items-center justify-center bg-cyan-600/90 border border-cyan-300/40 rounded-lg text-white hover:bg-cyan-500 active:scale-95 transition shadow"
                        aria-label="Replay word audio"
                        title="Replay Audio"
                      >
                        {Volume2 && <Volume2 size={16} />}
                      </button>
                    </div>
                  )}
                  
                  {renderGrid()}

                  {/* Phase B - Meaning Selection Overlay (顯示在遊戲中間) */}
                  {currentWord?.phase === 'B' && (
                    <div className="absolute inset-0 bg-black/70 flex items-center justify-center z-20 backdrop-blur-sm p-4">
                      <div className="bg-gray-900 p-6 rounded-2xl border-2 border-purple-500 shadow-2xl max-w-md w-full space-y-4 animate-in slide-in-from-bottom duration-300">
                        <h3 className="text-center text-2xl font-bold text-white mb-2 tracking-widest">{currentWord.data.word}</h3>
                        <p className="text-center text-sm md:text-xl text-gray-400 mb-4">Choose the correct meaning (選擇正確釋義)</p>
                        <div className="space-y-2">
                          {currentWord.data.currentOptions.map((opt, idx) => (
                            <button
                              key={idx}
                              onClick={() => handlePhaseBAnswer(opt)}
                              className={`w-full p-4 md:p-6 text-left rounded-lg transition-all text-base md:text-2xl font-medium border-2
                                ${idx === meaningCursorIndex 
                                  ? 'bg-purple-600 border-purple-400 text-white scale-105 shadow-lg' 
                                  : 'bg-gray-800 border-gray-700 text-gray-200 hover:bg-gray-700 hover:border-purple-500'
                                }`}
                            >
                              {idx + 1}. {opt}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                  
                  {/* Mobile/Tablet Keyboard */}
                  <div className="lg:hidden w-full px-2 pb-2">
                     <VirtualKeyboard />
                  </div>
                </div>

              </div>
            </div>
          );
        }

        // React 18 渲染啟動
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<VocabrisApp />);
    </script>
    
    <!-- Service Worker 註冊 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swUrl = '/service-worker.js?v=20260306-2';
          navigator.serviceWorker.register(swUrl)
            .then((registration) => {
              console.log('✅ Service Worker 註冊成功:', registration.scope);

              // 主動檢查新版 SW，避免手機長時間使用舊快取。
              registration.update();

              // 若有新版安裝完成並接管，強制重整一次載入新資源。
              let refreshing = false;
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
              });

              // 每分鐘檢查一次更新（行動裝置背景快取較積極時特別有幫助）。
              setInterval(() => registration.update(), 60000);
            })
            .catch((error) => {
              console.log('❌ Service Worker 註冊失敗:', error);
            });
        });
      }
    </script>
</body>
</html>
