services:
  - type: web
    name: vocabris
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 server.py"
    envVars:
      - key: PORT
        value: 8000
    disk:
      name: vocabris-data
      mountPath: /opt/render/project/src
      sizeGB: 1
