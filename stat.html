<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Vocabris - 帳號單字分數統計</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
	<div class="max-w-6xl mx-auto px-4 py-8">
		<div class="flex flex-wrap items-center justify-between gap-3 mb-6">
			<h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">單字分數統計</h1>
			<button id="backBtn" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg border border-gray-700">← 回到遊戲</button>
		</div>

		<div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-6 flex flex-wrap gap-3 items-center">
			<label for="userSelect" class="text-sm text-gray-400">帳號 | User:</label>
			<select id="userSelect" class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg">
				<option value="Ginger">Ginger</option>
				<option value="River">River</option>
				<option value="Sigma">Sigma</option>
			</select>
			<label for="levelSelect" class="text-sm text-gray-400">難度 | Level:</label>
			<select id="levelSelect" class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg">
				<option value="elementary">Elementary</option>
				<option value="intermediate">Intermediate</option>
				<option value="advanced">Advanced</option>
			</select>
			<div id="sourceInfo" class="text-sm text-cyan-300"></div>
			<div id="summary" class="text-sm text-gray-300"></div>
		</div>

		<section id="roundSettingsCard" class="bg-gray-900 border border-purple-700/40 rounded-2xl p-4 mb-6 hidden">
			<h2 class="text-xl font-bold text-purple-400 mb-2">本局設定</h2>
			<div id="roundSettings" class="text-sm text-gray-300"></div>
		</section>

		<section class="bg-gray-900 border border-blue-700/40 rounded-2xl p-4 mb-6">
			<div class="flex items-center justify-between gap-3 mb-2">
				<h2 class="text-xl font-bold text-blue-400">本局變動摘要</h2>
				<button id="clearSessionBtn" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg border border-gray-700 text-sm">清除本局摘要</button>
			</div>
			<div id="sessionSummary" class="text-sm text-gray-300 mb-3">無本局資料</div>
			<div id="sessionContainer" class="space-y-2"></div>
		</section>

		<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
			<section class="bg-gray-900 border border-green-700/40 rounded-2xl p-4">
				<h2 class="text-xl font-bold text-green-400 mb-3">正分單字（&gt; 0）</h2>
				<div id="positiveContainer" class="space-y-4"></div>
			</section>

			<section class="bg-gray-900 border border-red-700/40 rounded-2xl p-4">
				<h2 class="text-xl font-bold text-red-400 mb-3">負分單字（&lt; 0）</h2>
				<div id="negativeContainer" class="space-y-4"></div>
			</section>
		</div>
	</div>

	<script>
		const userSelect = document.getElementById('userSelect');
		const summary = document.getElementById('summary');
		const levelSelect = document.getElementById('levelSelect');
		const sourceInfo = document.getElementById('sourceInfo');
		const roundSettingsCard = document.getElementById('roundSettingsCard');
		const roundSettings = document.getElementById('roundSettings');
		const positiveContainer = document.getElementById('positiveContainer');
		const negativeContainer = document.getElementById('negativeContainer');
		const sessionSummary = document.getElementById('sessionSummary');
		const sessionContainer = document.getElementById('sessionContainer');
		const clearSessionBtn = document.getElementById('clearSessionBtn');
		const backBtn = document.getElementById('backBtn');

		const urlParams = new URLSearchParams(window.location.search);
		const urlUser = urlParams.get('user');
		const urlLevel = urlParams.get('level');
		const urlSpeed = urlParams.get('speed') || 'normal';
		const urlScore = urlParams.get('score') || '0';
		const isLockedMode = urlParams.get('locked') === '1';
		if (urlUser && ['Ginger', 'River', 'Sigma'].includes(urlUser)) {
			userSelect.value = urlUser;
		}
		if (urlLevel && ['elementary', 'intermediate', 'advanced'].includes(urlLevel)) {
			levelSelect.value = urlLevel;
		}

		if (isLockedMode) {
			userSelect.disabled = true;
			levelSelect.disabled = true;
			clearSessionBtn.disabled = true;
			userSelect.classList.add('opacity-60', 'cursor-not-allowed');
			levelSelect.classList.add('opacity-60', 'cursor-not-allowed');
			clearSessionBtn.classList.add('opacity-60', 'cursor-not-allowed');
			roundSettingsCard.classList.remove('hidden');
			roundSettings.textContent = `帳號: ${userSelect.value} ｜ 難度: ${levelSelect.value} ｜ 速度: ${urlSpeed} ｜ 最終分數: ${urlScore}`;
		}

		backBtn.addEventListener('click', () => {
			if (window.parent && window.parent !== window) {
				window.parent.postMessage({ type: 'STAT_CLOSE' }, '*');
			} else {
				window.location.href = '/index.html';
			}
		});

		userSelect.addEventListener('change', () => {
			if (isLockedMode) return;
			const user = userSelect.value;
			const level = levelSelect.value;
			const url = new URL(window.location.href);
			url.searchParams.set('user', user);
			url.searchParams.set('level', level);
			window.history.replaceState({}, '', url);
			loadStats();
		});

		levelSelect.addEventListener('change', () => {
			if (isLockedMode) return;
			const user = userSelect.value;
			const level = levelSelect.value;
			const url = new URL(window.location.href);
			url.searchParams.set('user', user);
			url.searchParams.set('level', level);
			window.history.replaceState({}, '', url);
			loadStats();
		});

		clearSessionBtn.addEventListener('click', () => {
			if (isLockedMode) return;
			const user = userSelect.value;
			clearSessionDelta(user, levelSelect.value);
			loadStats();
		});

		loadStats();

		async function loadStats() {
			try {
				const ts = Date.now();
				const user = userSelect.value;
				const activeLevel = levelSelect.value;
				const [levelDataResult, csvConfig] = await Promise.all([
					loadLevelWords(activeLevel, ts),
					loadCurrentCsvConfig(ts)
				]);

				if (!levelDataResult.ok) {
					throw new Error('無法載入目前等級資料');
				}

				const words = levelDataResult.words;
				const sourceFile = levelDataResult.source || ((csvConfig && csvConfig[activeLevel]) ? csvConfig[activeLevel] : '(unknown)');
				const sessionDelta = loadSessionDelta(user, activeLevel, sourceFile);
				const sessionMinusByWord = {};
				Object.entries(sessionDelta || {}).forEach(([word, info]) => {
					if ((info?.level || '') !== activeLevel) return;
					if (info?.source && info.source !== sourceFile) return;
					const minus = parseInt(info?.minus || '0', 10) || 0;
					if (minus > 0) sessionMinusByWord[word] = minus;
				});
				const positiveList = [];
				const negativeList = [];
				words.forEach((item) => {
					const score = parseInt(item[user] || '0', 10) || 0;
					const minusInSession = sessionMinusByWord[item.word] || 0;
					const displayNegativeScore = score < 0 ? score : (minusInSession > 0 ? -minusInSession : score);
					const row = { word: item.word, meaning: item.meaning, score, displayNegativeScore };
					if (score > 0) positiveList.push(row);
					if (score < 0 || minusInSession > 0) negativeList.push(row);
				});

				positiveList.sort((a, b) => b.score - a.score);
				negativeList.sort((a, b) => a.score - b.score);

				renderSingleLevelSection(positiveContainer, positiveList, true, activeLevel);
				renderSingleLevelSection(negativeContainer, negativeList, false, activeLevel);
				renderSessionDelta(sessionDelta, activeLevel, sourceFile);

				sourceInfo.textContent = `資料來源：${activeLevel} -> ${sourceFile}`;
				summary.textContent = `目前帳號：${user}｜目前等級：${activeLevel}｜正分 ${positiveList.length} 筆｜負分 ${negativeList.length} 筆`;
			} catch (error) {
				summary.textContent = '載入失敗: ' + error.message;
				sourceInfo.textContent = '';
				positiveContainer.innerHTML = '';
				negativeContainer.innerHTML = '';
				sessionSummary.textContent = '本局資料載入失敗';
				sessionContainer.innerHTML = '';
			}
		}

		async function loadLevelWords(level, ts) {
			try {
				const apiResponse = await fetch(`/api/get-level-words?level=${encodeURIComponent(level)}&v=${ts}`, { cache: 'no-store' });
				if (apiResponse.ok) {
					const data = await apiResponse.json();
					return {
						ok: true,
						source: data.source,
						words: Array.isArray(data.words) ? data.words : []
					};
				}
			} catch (error) {
				// ignore and fallback to CSV files
			}

			return loadLevelWordsFromCsvFallback(level, ts);
		}

		function parseCsvRow(line) {
			const values = [];
			let current = '';
			let inQuotes = false;

			for (let i = 0; i < line.length; i++) {
				const char = line[i];
				if (char === '"') {
					if (inQuotes && line[i + 1] === '"') {
						current += '"';
						i += 1;
					} else {
						inQuotes = !inQuotes;
					}
				} else if (char === ',' && !inQuotes) {
					values.push(current);
					current = '';
				} else {
					current += char;
				}
			}

			values.push(current);
			return values;
		}

		async function loadLevelWordsFromCsvFallback(level, ts) {
			const cfg = await loadCurrentCsvConfig(ts);
			const source = (cfg && cfg[level]) ? cfg[level] : `${level}_words.csv`;

			const csvResponse = await fetch(`/${source}?v=${ts}`, { cache: 'no-store' });
			if (!csvResponse.ok) {
				return { ok: false, source, words: [] };
			}

			const csvText = await csvResponse.text();
			const lines = csvText.split(/\r?\n/).filter((line) => line.trim() !== '');
			if (lines.length <= 1) {
				return { ok: true, source, words: [] };
			}

			const headers = parseCsvRow(lines[0]);
			const idx = {};
			headers.forEach((name, i) => {
				idx[name] = i;
			});

			const words = [];
			for (let i = 1; i < lines.length; i++) {
				const cols = parseCsvRow(lines[i]);
				const word = (cols[idx.word] || '').trim();
				const meaning = (cols[idx.meaning] || '').trim();
				if (!word || !meaning) continue;

				words.push({
					word,
					meaning,
					option1: (cols[idx.option1] || '').trim(),
					option2: (cols[idx.option2] || '').trim(),
					option3: (cols[idx.option3] || '').trim(),
					Ginger: (cols[idx.Ginger] || '0').trim() || '0',
					River: (cols[idx.River] || '0').trim() || '0',
					Sigma: (cols[idx.Sigma] || '0').trim() || '0'
				});
			}

			return { ok: true, source, words };
		}

		async function loadCurrentCsvConfig(ts) {
			const fallback = {
				elementary: 'elementary_words.csv',
				intermediate: 'intermediate_words.csv',
				advanced: 'advanced_words.csv'
			};

			try {
				const apiResponse = await fetch(`/api/get-csv-config?v=${ts}`, { cache: 'no-store' });
				if (apiResponse.ok) {
					return await apiResponse.json();
				}
			} catch (error) {
				// ignore and try static fallback
			}

			try {
				const staticResponse = await fetch(`/csv_config.json?v=${ts}`);
				if (staticResponse.ok) {
					return await staticResponse.json();
				}
			} catch (error) {
				// ignore and use hardcoded fallback
			}

			return fallback;
		}

		function loadSessionDelta(user, level, source) {
			const key = `vocabris_session_delta_${user}_${level}`;
			try {
				const raw = localStorage.getItem(key);
				if (!raw) return {};
				const parsed = JSON.parse(raw);
				return parsed && typeof parsed === 'object' ? parsed : {};
			} catch {
				return {};
			}
		}

		function clearSessionDelta(user, level) {
			try {
				localStorage.removeItem(`vocabris_session_delta_${user}_${level}`);
			} catch {
				// ignore storage errors
			}
		}

		function renderSessionDelta(deltaMap, activeLevel, sourceFile) {
			sessionContainer.innerHTML = '';
			const list = Object.entries(deltaMap || {})
				.map(([word, info]) => ({
					word,
					delta: parseInt(info?.delta || '0', 10) || 0,
					plus: parseInt(info?.plus || '0', 10) || (parseInt(info?.delta || '0', 10) > 0 ? parseInt(info?.delta || '0', 10) : 0),
					minus: parseInt(info?.minus || '0', 10) || (parseInt(info?.delta || '0', 10) < 0 ? Math.abs(parseInt(info?.delta || '0', 10)) : 0),
					level: info?.level || '',
					source: info?.source || '',
					meaning: info?.meaning || ''
				}))
				.filter((item) => item.level === activeLevel)
				.filter((item) => !item.source || item.source === sourceFile)
				.filter((item) => item.plus > 0 || item.minus > 0 || item.delta !== 0)
				.sort((a, b) => (b.plus + b.minus) - (a.plus + a.minus));

			if (list.length === 0) {
				sessionSummary.textContent = `本局目前在 ${activeLevel} 沒有分數變動`;
				return;
			}

			const plusCount = list.filter((item) => item.plus > 0).length;
			const minusCount = list.filter((item) => item.minus > 0).length;
			sessionSummary.textContent = `本局變動共 ${list.length} 筆｜有加分 ${plusCount}｜有扣分 ${minusCount}`;

			const table = document.createElement('table');
			table.className = 'w-full text-sm';
			table.innerHTML = `
				<thead>
					<tr class="text-left text-gray-400 border-b border-gray-700">
						<th class="py-1">單字</th>
						<th class="py-1">中文</th>
						<th class="py-1">Level</th>
						<th class="py-1 text-right">本局 +</th>
						<th class="py-1 text-right">本局 -</th>
						<th class="py-1 text-right">淨值 Δ</th>
					</tr>
				</thead>
			`;

			const tbody = document.createElement('tbody');
			list.forEach((row) => {
				const tr = document.createElement('tr');
				tr.className = 'border-b border-gray-800';
				const netSign = row.delta > 0 ? '+' : '';
				tr.innerHTML = `
					<td class="py-1 font-bold">${escapeHtml(row.word)}</td>
					<td class="py-1 text-gray-300">${escapeHtml(row.meaning)}</td>
					<td class="py-1 text-gray-400">${escapeHtml(row.level)}</td>
					<td class="py-1 text-right font-mono text-green-400">+${row.plus}</td>
					<td class="py-1 text-right font-mono text-red-400">-${row.minus}</td>
					<td class="py-1 text-right font-mono ${row.delta > 0 ? 'text-green-400' : (row.delta < 0 ? 'text-red-400' : 'text-gray-300')}">${netSign}${row.delta}</td>
				`;
				tbody.appendChild(tr);
			});

			table.appendChild(tbody);
			sessionContainer.appendChild(table);
		}

		function renderSingleLevelSection(container, list, isPositive, level) {
			container.innerHTML = '';
			const levelLabels = {
				elementary: 'Elementary',
				intermediate: 'Intermediate',
				advanced: 'Advanced'
			};

			const card = document.createElement('div');
			card.className = 'bg-gray-800/60 border border-gray-700 rounded-xl p-3';

			const title = document.createElement('div');
			title.className = 'text-sm font-bold text-gray-300 mb-2';
			title.textContent = `${levelLabels[level] || level} (${list.length})`;
			card.appendChild(title);

			if (list.length === 0) {
				const empty = document.createElement('p');
				empty.className = 'text-xs text-gray-500';
				empty.textContent = '無資料';
				card.appendChild(empty);
			} else {
				const table = document.createElement('table');
				table.className = 'w-full text-sm';
				table.innerHTML = `
					<thead>
						<tr class="text-left text-gray-400 border-b border-gray-700">
							<th class="py-1">單字</th>
							<th class="py-1">中文</th>
							<th class="py-1 text-right">分數</th>
						</tr>
					</thead>
				`;

				const tbody = document.createElement('tbody');
				list.forEach((row) => {
					const tr = document.createElement('tr');
					tr.className = 'border-b border-gray-800';
					const scoreToDisplay = isPositive ? row.score : (typeof row.displayNegativeScore === 'number' ? row.displayNegativeScore : row.score);
					tr.innerHTML = `
						<td class="py-1 font-bold">${escapeHtml(row.word)}</td>
						<td class="py-1 text-gray-300">${escapeHtml(row.meaning || '')}</td>
						<td class="py-1 text-right font-mono ${isPositive ? 'text-green-400' : 'text-red-400'}">${scoreToDisplay}</td>
					`;
					tbody.appendChild(tr);
				});

				table.appendChild(tbody);
				card.appendChild(table);
			}

			container.appendChild(card);
		}

		function escapeHtml(text) {
			return String(text ?? '')
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;');
		}
	</script>
</body>
</html>
